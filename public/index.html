<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل في نظام الصيانة الطبية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #007bff; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        #message { margin-top: 15px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<div class="register-container">
    <h2>إنشاء حساب جديد 🏥</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        <select id="role">
            <option value="hospital">مستشفى</option>
            <option value="engineer">مهندس صيانة</option>
        </select>
        <button type="submit">تسجيل الحساب</button>
    </form>
    <div id="message"></div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const messageDiv = document.getElementById('message');
        const data = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            role: document.getElementById('role').value
        };

        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            if (response.ok) {
                messageDiv.style.color = 'green';
                messageDiv.innerText = 'تم التسجيل بنجاح! جاري التحويل...';
            } else {
                messageDiv.style.color = 'red';
                messageDiv.innerText = 'خطأ: ' + result.error;
            }
        } catch (err) {
            messageDiv.innerText = 'فشل الاتصال بالسيرفر';
        }
    });
</script>

</body>
</html>
